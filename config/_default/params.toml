mainSections = ["post"]
rssFullContent = true

[footer]
    since = 2026

[sidebar]
    emoji = ""
    subtitle = ""

[article]
    headingAnchor = false
    math = false
    toc = true
    readingTime = true

    [article.license]
        enabled = false

[widgets]
    homepage = [
        { type = "search" },
        { type = "archives", params = { limit = 5 } },
        { type = "tag-cloud", params = { limit = 10 } },
    ]
    page = [{ type = "toc" }]

[colorScheme]
    toggle = true
    default = "auto"

[comments]
    enabled = false
